<script>
(function(){
 var buttons=document.querySelectorAll('.mk-lit-filter button'),cards=document.querySelectorAll('.mk-lit-card'),empty=document.getElementById('mk-lit-empty');
 buttons.forEach(function(button){button.addEventListener('click',function(){
  buttons.forEach(function(b){b.classList.remove('active')});button.classList.add('active');
  var filter=button.getAttribute('data-filter'),shown=0;
  cards.forEach(function(card){var visible=filter==='all'||card.getAttribute('data-categories').indexOf(filter)>-1;card.style.display=visible?'block':'none';if(visible)shown++;});
