name: 2027 언어와 매체 42개 전면 재작성 게시

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-publish:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4
      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 언어와 매체 42개 전면 재작성
        run: node scripts/rebuild-eonmae-pages.mjs
      - name: 구조·문항·해설 전수 검증
        run: node scripts/validate-eonmae-pages.mjs
      - name: WordPress 개별 42개와 통합 목록 게시
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        shell: bash
        run: |
          FILES=$(find wordpress-content -maxdepth 1 -type f -name '2027-suteuk-eonmae-*.html' | sort | tr '\n' ' ')
          COUNT=$(printf '%s' "$FILES" | wc -w)
          echo "게시 대상: ${COUNT}개"
          test "$COUNT" -eq 43
          node scripts/publish-wordpress.mjs $FILES
      - name: 생성된 HTML 저장
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wordpress-content/2027-suteuk-eonmae-*.html
          git commit -m "2027 언어와 매체 42개 재작성 게시본 저장" || exit 0
          git push
