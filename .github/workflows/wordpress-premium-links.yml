name: 기존 문학 글 프리미엄 광고 삽입

on:
  push:
    branches: [main]
    paths:
      - "wordpress-content/premium-links.json"
      - "scripts/add-premium-links.mjs"
      - ".github/workflows/wordpress-premium-links.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 기존 글 앞뒤에 작품별 프리미엄 광고 삽입
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: node scripts/add-premium-links.mjs
