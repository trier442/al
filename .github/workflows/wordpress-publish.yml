name: WordPress 게시

on:
  push:
    branches: [main]
    paths:
      - "wordpress-content/**/*.html"
      - "wordpress-content/images/**"
      - "scripts/standardize-hwajak-pages.mjs"
      - "scripts/fix-hwajak-pages.mjs"
      - "scripts/validate-hwajak-pages.mjs"
      - "scripts/lint-hwajak-language.mjs"
      - "scripts/hwajak-payload/**"
      - ".github/workflows/wordpress-publish.yml"
  workflow_dispatch:
    inputs:
      file:
        description: "게시할 HTML 파일 경로 또는 ALL_HWAJAK"
        required: true
        default: "ALL_HWAJAK"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 화법과 작문 57개 원고 생성
        run: node scripts/standardize-hwajak-pages.mjs

      - name: 화법과 작문 문장 보정
        run: node scripts/fix-hwajak-pages.mjs

      - name: 화법과 작문 구성 검증
        run: node scripts/validate-hwajak-pages.mjs

      - name: 화법과 작문 언어 검증
        run: node scripts/lint-hwajak-language.mjs

      - name: 게시 대상 확인
        id: files
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.file }}" = "ALL_HWAJAK" ]; then
              FILES=$(find wordpress-content -maxdepth 1 -type f -name '2027-suteuk-hwajak-*.html' | sort | tr '\n' ' ')
            else
              FILES="${{ inputs.file }}"
            fi
          else
            CHANGED=$(git diff --name-only HEAD^ HEAD)
            if printf '%s\n' "$CHANGED" | grep -Eq '^(scripts/(standardize-hwajak-pages|fix-hwajak-pages|validate-hwajak-pages|lint-hwajak-language)\.mjs|scripts/hwajak-payload/|wordpress-content/2027-suteuk-hwajak-|\.github/workflows/wordpress-publish\.yml)'; then
              FILES=$(find wordpress-content -maxdepth 1 -type f -name '2027-suteuk-hwajak-*.html' | sort | tr '\n' ' ')
            else
              FILES=$(git diff --name-only HEAD^ HEAD -- ':(glob)wordpress-content/**/*.html' | tr '\n' ' ')
              if printf '%s\n' "$FILES" | grep -q 'wordpress-content/2027-suteuk-reading-'; then
                FILES=$(find wordpress-content -maxdepth 1 -type f -name '2027-suteuk-reading-*.html' | sort | tr '\n' ' ')
              fi
            fi
          fi
          if [ -z "$FILES" ]; then
            echo "게시할 HTML 파일을 찾지 못했습니다." >&2
            exit 1
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "게시 대상: $(printf '%s' "$FILES" | wc -w)개"

      - name: WordPress로 전송
        if: steps.files.outputs.files != ''
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: node scripts/publish-wordpress.mjs ${{ steps.files.outputs.files }}
