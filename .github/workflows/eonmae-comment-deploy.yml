name: 2027 언어와 매체 관리자 게시

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: eonmae-c01-admin-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.actor == 'trier442' &&
      github.event.issue.pull_request &&
      github.event.comment.body == '/deploy-eonmae-c01'
    runs-on: ubuntu-latest
    steps:
      - name: 검증된 main 원고 가져오기
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2

      - name: 실행 시작 기록
        env:
          TRIGGER_PR: ${{ github.event.issue.number }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const marker={
            started_at:new Date().toISOString(),
            workflow_run_id:process.env.GITHUB_RUN_ID,
            trigger_pr:Number(process.env.TRIGGER_PR),
            trigger_command:'/deploy-eonmae-c01',
            status:'started'
          };
          fs.writeFileSync('scripts/eonmae-live-deploy-started.json',JSON.stringify(marker,null,2)+'\n');
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/eonmae-live-deploy-started.json
          git commit -m "언어와 매체 C01 배포 실행 시작 [skip ci]"
          git push origin HEAD:main

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 원고 재생성 및 검사
        run: |
          node scripts/build-eonmae-c01.mjs
          node scripts/validate-eonmae-sequential.mjs
          node scripts/validate-eonmae-c01.mjs

      - name: 공개 2개·비공개 41개 상태 적용
        id: sync
        continue-on-error: true
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        shell: bash
        run: |
          set -o pipefail
          node scripts/sync-eonmae-visibility.mjs 2>&1 | tee scripts/eonmae-sync.log

      - name: 동기화 진단 자료 보관
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eonmae-sync-diagnostics-${{ github.run_id }}
          path: |
            scripts/eonmae-sync.log
            scripts/eonmae-sequential-verification.json
          if-no-files-found: warn

      - name: 동기화 실패 중단
        if: steps.sync.outcome == 'failure'
        run: |
          echo "WordPress 공개 상태 동기화가 실패했습니다. 진단 산출물을 확인하십시오."
          exit 1

      - name: 통합 목록과 C01 게시
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          ALLOW_EONMAE_PUBLISH: PUBLISH_APPROVED
        run: |
          node scripts/publish-wordpress.mjs \
            wordpress-content/2027-suteuk-eonmae-index.html \
            wordpress-content/2027-suteuk-eonmae-c01.html

      - name: C01 실서비스 본문 검증
        env:
          WP_URL: ${{ secrets.WP_URL }}
        run: node scripts/validate-eonmae-c01.mjs --live

      - name: 통합 목록과 비공개 상태 최종 검증
        env:
          WP_URL: ${{ secrets.WP_URL }}
        run: |
          node --input-type=module <<'NODE'
          const base=(process.env.WP_URL||'https://modukorean.co.kr').replace(/\/$/,'');
          const indexSlug='2027-수능특강-언어와-매체-전체-해설-및-변형-문제';
          async function getJson(url){
            let last;
            for(let attempt=1;attempt<=5;attempt++){
              const res=await fetch(url+(url.includes('?')?'&':'?')+`_verify=${Date.now()}-${attempt}`,{
                headers:{'cache-control':'no-cache',pragma:'no-cache','user-agent':'modukorean-eonmae-live-verifier/1.0'}
              });
              if(res.ok)return await res.json();
              last=new Error(`${res.status} ${res.statusText}: ${url}`);
              await new Promise(resolve=>setTimeout(resolve,attempt*1000));
            }
            throw last;
          }
          const index=await getJson(`${base}/wp-json/wp/v2/pages?slug=${encodeURIComponent(indexSlug)}&_fields=id,slug,status,content,link`);
          if(!Array.isArray(index)||index.length!==1)throw new Error(`통합 목록 REST 결과가 ${Array.isArray(index)?index.length:'비배열'}개입니다.`);
          const rendered=String(index[0]?.content?.rendered||'');
          if(!rendered.includes('data-eonmae-index="sequential"'))throw new Error('통합 목록 순차 공개 표식이 없습니다.');
          if(!rendered.includes('현재 1개'))throw new Error('통합 목록 현재 공개 수가 1개가 아닙니다.');
          if(!rendered.includes('/2027-suteuk-eonmae-c01/'))throw new Error('통합 목록에 C01 링크가 없습니다.');
          const c02=await getJson(`${base}/wp-json/wp/v2/pages?slug=2027-suteuk-eonmae-c02&_fields=id,slug,status`);
          if(!Array.isArray(c02)||c02.length!==0)throw new Error('C02가 비인증 REST에 노출되어 있습니다.');
          console.log(`통합 목록 공개 확인: ${index[0].link}`);
          console.log('C02 이하 비공개 유지 확인');
          NODE

      - name: 성공 확인서 저장
        env:
          TRIGGER_PR: ${{ github.event.issue.number }}
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const report=JSON.parse(fs.readFileSync('scripts/eonmae-sequential-verification.json','utf8'));
          if(report.status!=='success'||report.approved_items!==2||report.hidden_items!==41){
            throw new Error('공개 상태 검증 수치가 맞지 않습니다.');
          }
          const receipt={
            deployed_at:new Date().toISOString(),
            source_commit:process.env.GITHUB_SHA,
            workflow_run_id:process.env.GITHUB_RUN_ID,
            trigger_pr:Number(process.env.TRIGGER_PR),
            trigger_command:'/deploy-eonmae-c01',
            approved_items:report.approved_items,
            hidden_items:report.hidden_items,
            pending_create_items:report.pending_create_items||0,
            index_verified:true,
            c01_version:'2026-07-23-v1',
            c01_question_count:36,
            index_slug:'2027-수능특강-언어와-매체-전체-해설-및-변형-문제',
            c01_slug:'2027-suteuk-eonmae-c01',
            status:'success'
          };
          fs.writeFileSync('scripts/eonmae-live-deploy-receipt.json',JSON.stringify(receipt,null,2)+'\n');
          NODE
          git add scripts/eonmae-sequential-verification.json scripts/eonmae-live-deploy-receipt.json
          git commit -m "언어와 매체 C01 실서비스 배포 확인 [skip ci]"
          git push origin HEAD:main

      - name: 검증 결과 보관
        uses: actions/upload-artifact@v4
        with:
          name: eonmae-c01-live-deploy-${{ github.run_id }}
          path: |
            scripts/eonmae-sequential-verification.json
            scripts/eonmae-live-deploy-started.json
            scripts/eonmae-live-deploy-receipt.json
          if-no-files-found: error
