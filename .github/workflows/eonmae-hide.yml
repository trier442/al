name: 2027 언어와 매체 전체 비공개

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/hide-eonmae.mjs"
      - "scripts/mark-eonmae-draft.mjs"
      - "scripts/eonmae-visibility.json"
      - "scripts/publish-wordpress.mjs"
      - ".github/workflows/eonmae-hide.yml"
      - ".github/workflows/eonmae-publish.yml"
  push:
    branches: [main]
    paths:
      - "scripts/hide-eonmae.mjs"
      - "scripts/mark-eonmae-draft.mjs"
      - "scripts/eonmae-visibility.json"
      - "scripts/publish-wordpress.mjs"
      - ".github/workflows/eonmae-hide.yml"
      - ".github/workflows/eonmae-publish.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: eonmae-hide-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hide-all:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 비공개 설정 및 스크립트 검사
        shell: bash
        run: |
          node -e "const s=require('./scripts/eonmae-visibility.json'); if(!s.hidden || s.expected_items!==43) throw new Error('비공개 설정 오류');"
          node --check scripts/mark-eonmae-draft.mjs
          node --check scripts/hide-eonmae.mjs
          node --check scripts/publish-wordpress.mjs

      - name: 저장소 원고 43개를 draft로 표시
        if: github.event_name != 'pull_request'
        run: node scripts/mark-eonmae-draft.mjs

      - name: WordPress 개별 글 42개와 통합 목록 1개 비공개
        if: github.event_name != 'pull_request'
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: node scripts/hide-eonmae.mjs

      - name: 비공개 검증 결과 보관
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: eonmae-hidden-verification
          path: scripts/eonmae-hidden-verification.json
          if-no-files-found: error

      - name: draft 원고와 검증 기록 저장
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wordpress-content/2027-suteuk-eonmae-*.html scripts/eonmae-hidden-verification.json
          if git diff --cached --quiet; then
            echo "저장할 변경이 없습니다."
          else
            git commit -m "언어와 매체 전체 비공개 상태 반영 [skip ci]"
            git push
          fi
