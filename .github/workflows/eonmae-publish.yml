name: 2027 언어와 매체 게시 잠금

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  locked:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 비공개 상태 확인
        shell: bash
        run: |
          node -e "const s=require('./scripts/eonmae-visibility.json'); if(!s.hidden) process.exit(1); console.log('언어와 매체 전체 비공개 상태: 자동·수동 게시가 잠겨 있습니다.');"

      - name: 게시 중지 안내
        run: |
          echo "개별 글 42개와 통합 목록 1개는 전체 재검수 전까지 게시하지 않습니다."
          echo "단원별 완성본을 다시 공개할 때 별도의 승인된 게시 절차를 사용해야 합니다."
