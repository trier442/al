name: 2027 언어와 매체 교정 및 재게시

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/eonmae-*.mjs"
      - "scripts/eonmae-*.json"
      - "scripts/eonmae-assets/**"
      - "wordpress-content/2027-suteuk-eonmae-*.html"
      - ".github/workflows/eonmae-publish.yml"
  push:
    branches: [main]
    paths:
      - "scripts/eonmae-*.mjs"
      - "scripts/eonmae-*.json"
      - "scripts/eonmae-assets/**"
      - "wordpress-content/2027-suteuk-eonmae-*.html"
      - ".github/workflows/eonmae-publish.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: eonmae-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rebuild-validate-publish:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 42개 글과 통합 목록 재생성
        run: node scripts/rebuild-eonmae-pages.mjs

      - name: 구성·문항·문장 전수 검증
        shell: bash
        run: |
          set -o pipefail
          node scripts/validate-eonmae-pages.mjs 2>&1 | tee eonmae-validation.log
          git diff --check 2>&1 | tee -a eonmae-validation.log

      - name: 검증 로그 보관
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eonmae-validation-log
          path: eonmae-validation.log

      - name: 게시 대상 확정
        if: github.event_name != 'pull_request'
        id: files
        shell: bash
        run: |
          FILES=$(find wordpress-content -maxdepth 1 -type f -name '2027-suteuk-eonmae-*.html' | sort | tr '\n' ' ')
          COUNT=$(printf '%s' "$FILES" | wc -w)
          if [ "$COUNT" -ne 43 ]; then
            echo "게시 대상은 개별 글 42개와 통합 목록 1개여야 하지만 ${COUNT}개입니다." >&2
            exit 1
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "게시 대상: ${COUNT}개"

      - name: WordPress로 43개 자료 재게시
        if: github.event_name != 'pull_request'
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: node scripts/publish-wordpress.mjs ${{ steps.files.outputs.files }}

      - name: WordPress REST·공개 페이지 42개 실서비스 검증
        env:
          WP_URL: ${{ secrets.WP_URL }}
        run: node scripts/verify-eonmae-live.mjs

      - name: 실서비스 검증 결과 보관
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eonmae-live-verification
          path: scripts/eonmae-live-verification.json
          if-no-files-found: ignore

      - name: 생성 결과와 실서비스 검증 기록 저장
        if: github.event_name != 'pull_request'
        continue-on-error: true
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wordpress-content/2027-suteuk-eonmae-*.html scripts/eonmae-live-verification.json
          if git diff --cached --quiet; then
            echo "저장할 생성·검증 결과가 없습니다."
          else
            git commit -m "언어와 매체 교정 게시본 및 실서비스 검증 반영 [skip ci]"
            git push
          fi
