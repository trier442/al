name: 2027 화작 57개 일회 게시

on:
  pull_request:
    types: [closed]
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: hwajak-one-time-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 화법과 작문 57개 원고 생성
        id: generate
        continue-on-error: true
        shell: bash
        run: |
          : > /tmp/hwajak-generate.log
          if ! node scripts/recover-hwajak-payload.mjs >> /tmp/hwajak-generate.log 2>&1; then
            python3 scripts/rank-hwajak-recovery.py >> /tmp/hwajak-generate.log 2>&1
            python3 scripts/dump-hwajak-candidate.py >> /tmp/hwajak-generate.log 2>&1
            exit 1
          fi
          node scripts/diagnose-hwajak-payload.mjs >> /tmp/hwajak-generate.log 2>&1
          node scripts/standardize-hwajak-pages.mjs >> /tmp/hwajak-generate.log 2>&1

      - name: 생성 오류 저장
        if: steps.generate.outcome == 'failure'
        shell: bash
        run: |
          cp /tmp/hwajak-generate.log scripts/hwajak-generate-error.log
          cat /tmp/hwajak-generate.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/hwajak-generate-error.log scripts/hwajak-corrupt-slice.txt scripts/hwajak-candidate-diff.txt scripts/hwajak-cg-affected.json
          git commit -m "화작 생성 오류 로그 저장" || true
          git push || true

      - name: 생성 실패 중단
        if: steps.generate.outcome == 'failure'
        run: exit 1

      - name: 조사 및 해설 문장 보정
        run: node scripts/fix-hwajak-pages.mjs

      - name: 구성 검증
        run: node scripts/validate-hwajak-pages.mjs

      - name: 언어 검증
        run: node scripts/lint-hwajak-language.mjs

      - name: WordPress 57개 글과 통합 목록 게시
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        shell: bash
        run: |
          FILES=$(find wordpress-content -maxdepth 1 -type f -name '2027-suteuk-hwajak-*.html' | sort | tr '\n' ' ')
          COUNT=$(printf '%s' "$FILES" | wc -w)
          echo "게시 대상: ${COUNT}개"
          test "$COUNT" -eq 58
          node scripts/publish-wordpress.mjs $FILES

      - name: 일회성 배포 파일 정리
        shell: bash
        run: |
          rm -f .github/workflows/hwajak-one-time-publish.yml
          rm -f scripts/hwajak-payload/publish-*.txt
          rm -f scripts/hwajak-generate-error.log scripts/hwajak-corrupt-slice.txt scripts/hwajak-candidate-diff.txt scripts/hwajak-cg-affected.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "화작 일회 게시 워크플로 정리" || exit 0
          git push
