name: 언어와 매체 즉시 비공개 일회성 실행

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/eonmae-hide-now.yml"
      - "scripts/hide-eonmae-index.mjs"

permissions:
  contents: read

jobs:
  hide-index:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 통합 목록 처리기 검사
        run: node --check scripts/hide-eonmae-index.mjs

      - name: WordPress 통합 목록 비공개 및 공개 접근 검증
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: node scripts/hide-eonmae-index.mjs | tee eonmae-index-hidden.json

      - name: 검증 결과 보관
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eonmae-index-hidden-verification
          path: eonmae-index-hidden.json
          if-no-files-found: error
